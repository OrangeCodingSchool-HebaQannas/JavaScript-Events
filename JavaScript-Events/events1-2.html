<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Events task 1 & 2</title>
</head>

<style>
  body {
    max-width: 400px;
    margin: 60px auto;
    padding: 0 20px;
    background: #222;
    color: #222;
  }

  h2 {
    font-size: 18px;
    margin-bottom: 12px;
    color: #e5e5e5;
  }

  .section {
    margin-bottom: 40px;
  }

  /* task 1 */
  
  #smartBtn {
    padding: 10px 24px;
    font-size: 15px;
    border: 2px solid #0db61b;
    border-radius: 6px;
    background: #29fc3b;
    cursor: pointer;
    color:#000000 ;
  }

  #smartBtn.active {
    background: #222;
    color: #29fc3b;
  }

  /* task 2 */
  #liveInput {
    width: 100%;
    padding: 10px;
    font-size: 15px;
    border: 2px solid #0db61b;
    border-radius: 6px;
    outline: none;
    box-sizing: border-box;
  }

  #liveInput:focus {
    border-color: #222;
  }

  #preview {
    margin-top: 12px;
    padding: 10px;
    min-height: 42px;
    border: 1px dashed #0db61b;
    border-radius: 6px;
    font-size: 15px;
    color: #ffffff;
  }
</style>
</head>
<body>

  <!-- Task 1 -->
  <div class="section">
    <h2>Task 1 — Smart Button</h2>
    <button id="smartBtn">Click me</button>
  </div>

  <!-- Task 2 -->
  <div class="section">
    <h2>Task 2 — Live Input Preview</h2>
    <input id="liveInput" type="text" placeholder="Type something..." />
    <p id="preview"></p>
  </div>

<script>
  // Task 1

  const btn   = document.getElementById('smartBtn');
  let clicked = false;

  btn.addEventListener('click', function() {
    clicked = !clicked;

    if (clicked) {
      btn.textContent = 'Clicked!';
      btn.classList.add('active');
    } else {
      btn.textContent = 'Click me';
      btn.classList.remove('active');
    }
  });

  // Task 2
  
  const input   = document.getElementById('liveInput');
  const preview = document.getElementById('preview');

  input.addEventListener('input', function(event) {
    preview.textContent = event.target.value;
  });
  
</script>
</body>
</html>
